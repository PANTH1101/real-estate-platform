{% extends "base.html" %}
{% block title %}Admin Panel Login{% endblock %}

{% block content %}
<section class="admin-login-wrap">
    <div class="admin-login-card card border-0 shadow">
        <div class="card-body p-4 p-md-5">
            <h1 class="h4 mb-1">Admin Panel Login</h1>
            <p class="text-muted mb-4">Sign in with your admin email and password.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_email" class="form-label">Admin Email</label>
                    <input
                        type="email"
                        id="id_email"
                        name="email"
                        class="form-control"
                        placeholder="admin@example.com"
                        value="{{ email|default:'' }}"
                        required
                    >
                </div>
                <div class="mb-4">
                    <label for="id_password" class="form-label">Password</label>
                    <input
                        type="password"
                        id="id_password"
                        name="password"
                        class="form-control"
                        placeholder="Enter your password"
                        required
                    >
                </div>
                <button type="submit" class="btn btn-primary w-100">Login to Admin Panel</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
